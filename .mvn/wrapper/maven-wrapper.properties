# Configuracao do Maven Wrapper.
# distributionUrl  -> qual versao do Maven o wrapper baixa e usa na 1a execucao.
# wrapperUrl       -> de onde o wrapper baixa o proprio maven-wrapper.jar, se faltar.
# O Maven baixado fica em ~/.m2/wrapper/dists (nao entra no repositorio).
distributionUrl=https://repo.maven.apache.org/maven2/org/apache/maven/apache-maven/3.9.9/apache-maven-3.9.9-bin.zip
wrapperUrl=https://repo.maven.apache.org/maven2/org/apache/maven/wrapper/maven-wrapper/3.3.2/maven-wrapper-3.3.2.jar
